services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      node1:
        condition: service_healthy
    networks:
      - blockchain-net

  node1:
    build: .
    ports:
      - "3000:3000"
      - "6000:6000"
    environment:
      - PORT=3000
      - P2P_PORT=6000
      - P2P_HOST=node1
    volumes:
      - ./data/node1:/app/data
    networks:
      - blockchain-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  node2:
    build: .
    ports:
      - "3001:3000"
      - "6001:6000"
    environment:
      - PORT=3000
      - P2P_PORT=6000
      - P2P_HOST=node2
      - SEED_NODE=ws://node1:6000
    volumes:
      - ./data/node2:/app/data
    depends_on:
      node1:
        condition: service_healthy
    networks:
      - blockchain-net

  node3:
    build: .
    ports:
      - "3002:3000"
      - "6002:6000"
    environment:
      - PORT=3000
      - P2P_PORT=6000
      - P2P_HOST=node3
      - SEED_NODE=ws://node1:6000
    volumes:
      - ./data/node3:/app/data
    depends_on:
      node1:
        condition: service_healthy
    networks:
      - blockchain-net

  node4:
    build: .
    ports:
      - "3003:3000"
      - "6003:6000"
    environment:
      - PORT=3000
      - P2P_PORT=6000
      - P2P_HOST=node4
      - SEED_NODE=ws://node1:6000
    volumes:
      - ./data/node4:/app/data
    depends_on:
      node1:
        condition: service_healthy
    networks:
      - blockchain-net

  node5:
    build: .
    ports:
      - "3004:3000"
      - "6004:6000"
    environment:
      - PORT=3000
      - P2P_PORT=6000
      - P2P_HOST=node5
      - SEED_NODE=ws://node1:6000
    volumes:
      - ./data/node5:/app/data
    depends_on:
      node1:
        condition: service_healthy
    networks:
      - blockchain-net

networks:
  blockchain-net:
    driver: bridge
