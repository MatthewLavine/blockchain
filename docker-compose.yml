services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://localhost:7000
    ports:
      - "8088:80"
    depends_on:
      node1:
        condition: service_healthy
    networks:
      - blockchain-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 1s
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/src
          action: rebuild

  node1:
    build: .
    ports:
      - "7000:7000"
      - "6000:6000"
    environment:
      - PORT=7000
      - P2P_PORT=6000
      - P2P_HOST=node1
      - MAX_PEERS=5
    volumes:
      - ./data/node1:/app/data
    networks:
      - blockchain-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 1s
    develop:
      watch:
        - path: ./package.json
          action: rebuild
        - path: ./src
          action: rebuild

  node2:
